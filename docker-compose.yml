services:
  sendspin-image-server:
    build: .
    container_name: sendspin-image-server
    restart: unless-stopped
    network_mode: host
    ports:
      - "8927:8927" # WebSocket
      - "8928:8928" # HTTP/UI
    volumes:
      - sendspin-images:/app/images
      - sendspin-data:/data
    environment:
      - PYTHONUNBUFFERED=1

volumes:
  sendspin-images:
  sendspin-data:

name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency: release
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install python-semantic-release
        run: pip install python-semantic-release>=9.0

      - name: Run semantic-release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: semantic-release version

      - name: Trigger publish on new tag
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          TAG=$(git describe --exact-match --tags HEAD 2>/dev/null || true)
          if [ -n "$TAG" ]; then
            echo "New release tag: $TAG — triggering publish workflow"
            gh workflow run publish.yml \
              --repo ${{ github.repository }} \
              --ref "$TAG"
          else
            echo "No new tag on HEAD — skipping publish"
          fi
